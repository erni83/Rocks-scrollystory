<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIN Stats</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<style>
#lin_statsBar *{box-sizing:border-box;margin:0;padding:0;}

#lin_statsBar {
  --lin_blue:   #6399AF;
  --lin_white:  #FFFFFF;
  --lin_divider:rgba(255,255,255,0.12);
  --lin_font:   'Inter', -apple-system, sans-serif;

  font-family: var(--lin_font);
  background: linear-gradient(to bottom, #1A2330 0%, transparent 100%);
  padding: 52px 40px;
  width: 100%;
}

#lin_statsBar .lin_stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  max-width: 960px;
  margin: 0 auto;
}

#lin_statsBar .lin_stat + .lin_stat {
  border-left: 1px solid var(--lin_divider);
}

#lin_statsBar .lin_stat {
  padding: 0 40px;
  opacity: 0;
  transform: translateY(16px);
}

#lin_statsBar .lin_stat:first-child { padding-left: 0; }
#lin_statsBar .lin_stat:last-child  { padding-right: 0; }

/* number row */
#lin_statsBar .lin_stat-num {
  display: flex;
  align-items: baseline;
  margin-bottom: 12px;
  line-height: 1;
}

#lin_statsBar .lin_stat-pfx {
  font-size: 2.25rem;
  font-weight: 700;
  color: var(--lin_blue);
  letter-spacing: -0.03em;
}

#lin_statsBar .lin_stat-val {
  font-size: 3.5rem;
  font-weight: 700;
  color: var(--lin_blue);
  letter-spacing: -0.04em;
  line-height: 1;
}

#lin_statsBar .lin_stat-sfx {
  font-size: 1.5rem;
  font-weight: 400;
  color: var(--lin_white);
  margin-left: 2px;
  align-self: flex-end;
  padding-bottom: 6px;
}

#lin_statsBar .lin_stat-label {
  font-size: 0.8125rem;
  font-weight: 400;
  color: var(--lin_white);
  line-height: 1.55;
  opacity: 0.72;
  max-width: 200px;
}

@media (max-width: 640px) {
  #lin_statsBar .lin_stats {
    grid-template-columns: 1fr;
    gap: 32px;
  }
  #lin_statsBar .lin_stat + .lin_stat {
    border-left: none;
    border-top: 1px solid var(--lin_divider);
    padding-top: 32px;
  }
  #lin_statsBar .lin_stat { padding: 0; }
}
</style>
</head>
<body style="background:#0e1520;min-height:100vh;display:flex;align-items:center;justify-content:center;">

<div id="lin_statsBar">
  <div class="lin_stats">

    <div class="lin_stat" data-val="94">
      <div class="lin_stat-num">
        <span class="lin_stat-val">0</span>
        <span class="lin_stat-sfx">%</span>
      </div>
      <div class="lin_stat-label">Reduction in heat-related hospitalizations</div>
    </div>

    <div class="lin_stat" data-val="20">
      <div class="lin_stat-num">
        <span class="lin_stat-pfx">+</span>
        <span class="lin_stat-val">0</span>
        <span class="lin_stat-sfx">%</span>
      </div>
      <div class="lin_stat-label">Increase in worker productivity (up to)</div>
    </div>

    <div class="lin_stat" data-val="60">
      <div class="lin_stat-num">
        <span class="lin_stat-val">0</span>
        <span class="lin_stat-sfx">%</span>
      </div>
      <div class="lin_stat-label">Positive Return on Investment generated</div>
    </div>

  </div>
</div>

<script>
(function(){
  const wrapper = document.querySelector('#lin_statsBar');
  if (!wrapper) return;

  gsap.registerPlugin(ScrollTrigger);

  const cards = wrapper.querySelectorAll('.lin_stat');
  let fired = false;

  function animateAll() {
    if (fired) return;
    fired = true;

    cards.forEach((card, i) => {
      const valEl  = card.querySelector('.lin_stat-val');
      const target = parseInt(card.dataset.val, 10);
      const delay  = i * 0.22;

      gsap.to(card, {
        opacity: 1,
        y: 0,
        duration: 0.55,
        ease: 'power2.out',
        delay
      });

      gsap.to({ n: 0 }, {
        n: target,
        duration: 1.4,
        ease: 'power3.out',
        delay: delay + 0.1,
        onUpdate: function() {
          valEl.textContent = Math.round(this.targets()[0].n);
        }
      });
    });
  }

  ScrollTrigger.create({
    trigger: wrapper,
    start: 'top 82%',
    onEnter: animateAll
  });

  gsap.delayedCall(0.25, () => {
    if (wrapper.getBoundingClientRect().top < window.innerHeight * 0.9) animateAll();
  });
})();
</script>
</body>
</html>
